server:
  port: 8002
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true
spring:
  application:
    name: first

  # Redis Stack 配置
  data:
    redis:
      host: localhost
      port: 6379
  #  阿里云大模型配置
  ai:
    dashscope:
      api-key: ${ALIYU_KEY}
      base-url:
        https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model:
            qwen3-max
      embedding:
        options:
          model:
            text-embedding-v3
    vectorstore:
      redis:
        initialize-schema: true
        index-name: custom-index
        prefix: custom-prefix